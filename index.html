<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>内容部摄影组 · 排班系统</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Noto Sans', sans-serif;
        }
        body {
            background: #eef2f7;
            margin: 0;
            padding: 24px 20px;
            color: #1e2a3e;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
            overflow: hidden;
            padding: 20px 24px 32px 24px;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0 0 4px 0;
            background: linear-gradient(135deg, #0f2b3d, #1b4a6e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .sub {
            color: #4a627a;
            border-left: 4px solid #3b82f6;
            padding-left: 16px;
            margin: 8px 0 20px 0;
            font-size: 0.85rem;
            font-weight: 500;
        }
        /* 员工分组样式 */
        .staff-groups {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .staff-groups .group {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            padding: 8px 14px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #e2e8f0;
        }
        .staff-groups .group h3 {
            margin: 0;
            font-size: 0.85rem;
            font-weight: 600;
            color: #475569;
            white-space: nowrap;
        }
        .staff-groups .group span {
            font-size: 0.8rem;
            color: #64748b;
            padding: 3px 8px;
            background: white;
            border-radius: 12px;
            white-space: nowrap;
            border: 1px solid #e2e8f0;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            gap: 16px;
        }
        .month-nav {
            display: flex;
            gap: 12px;
            align-items: center;
            background: #f8fafc;
            padding: 6px 12px;
            border-radius: 60px;
        }
        .month-nav button {
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            padding: 8px 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }
        .month-nav button:hover {
            background: #eef2ff;
            border-color: #3b82f6;
            color: #1e40af;
        }
        .current-month {
            font-weight: 700;
            font-size: 1.3rem;
            background: #e6f0ff;
            padding: 6px 20px;
            border-radius: 40px;
            color: #075985;
        }
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            background: #f9f9fb;
            padding: 10px 20px;
            border-radius: 28px;
            margin-bottom: 24px;
            font-size: 0.7rem;
            border: 1px solid #e4e9f0;
        }
        .legend span {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .badge-icon {
            display: inline-block;
            width: 26px;
            height: 26px;
            border-radius: 12px;
            text-align: center;
            line-height: 26px;
            font-weight: 700;
            font-size: 0.7rem;
            background: #e2e8f0;
        }
        .badge-B { background: #b9f5d8; color: #0a5c2e; } 
        .badge-N { background: #c7d2fe; color: #1e3a8a; } 
        .badge-S { background: #fed7aa; color: #9b4a00; } 
        .badge-R { background: #fecaca; color: #991b1b; } 
        .table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
            border: 1px solid #e9edf2;
            background: white;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            min-width: 680px;
        }
        th {
            background: #f1f5f9;
            padding: 14px 10px;
            font-weight: 700;
            font-size: 0.85rem;
            border-bottom: 2px solid #cbd5e1;
            text-align: center;
        }
        td {
            border-bottom: 1px solid #e9edf2;
            padding: 12px 8px;
            vertical-align: top;
            line-height: 1.4;
        }
        .date-col {
            font-weight: 700;
            background-color: #fafcff;
            white-space: nowrap;
            text-align: center;
            width: 95px;
        }
        .weekend-bg {
            background-color: #fff6ea;
        }
        /* 今日定位框选样式 */
        .today-highlight {
            border: 3px solid #dc2626;
            border-radius: 8px;
            margin: 4px 0;
        }
        .today-badge {
            background: #dc2626;
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.65rem;
            font-weight: 700;
            margin-left: 8px;
        }
        .staff-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }
        .staff-tag {
            background: #f1f3f6;
            border-radius: 30px;
            padding: 4px 10px;
            font-size: 0.7rem;
            font-weight: 500;
            white-space: nowrap;
        }
        .staff-tag.video { background: #e0f2fe; color: #0369a1; border-left: 3px solid #0ea5e9; }
        .staff-tag.photo { background: #f1e4ff; color: #6b21a5; border-left: 3px solid #a855f7; }
        .staff-tag.rest { background: #ffe4e2; color: #b91c1c; }
        .note-text {
            font-size: 0.7rem;
            color: #7e5a2c;
            margin-top: 4px;
        }
        .caption-note {
            margin-top: 24px;
            font-size: 0.73rem;
            background: #f1f4f9;
            padding: 14px 20px;
            border-radius: 20px;
            color: #2c3e66;
            border-left: 4px solid #3b82f6;
        }
        .footer-stats {
            font-size: 0.7rem;
            color: #4b5563;
            margin-top: 16px;
            text-align: right;
        }
        /* 今日排班卡片样式 */
        .today-schedule {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 20px 24px;
            margin-bottom: 24px;
            color: white;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }
        .today-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        .today-time {
            font-size: 1rem;
            opacity: 0.9;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'SF Mono', Monaco, monospace;
        }
        .today-time svg {
            width: 20px;
            height: 20px;
        }
        .today-title {
            font-size: 1.3rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .today-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .today-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        .today-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
        }
        .today-item {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 12px 14px;
            backdrop-filter: blur(10px);
        }
        .today-item-label {
            font-size: 0.7rem;
            opacity: 0.8;
            margin-bottom: 6px;
        }
        .today-item-value {
            font-size: 0.85rem;
            font-weight: 600;
            line-height: 1.5;
        }
        .video-icon { color: #7dd3fc; }
        .photo-icon { color: #f9a8d4; }
        .rest-icon { color: #fca5a5; }
        .leave-icon { color: #fbbf24; }
        .cover-icon { color: #34d399; }
        .empty-state {
            color: rgba(255, 255, 255, 0.5);
            font-style: italic;
        }
        /* 弹窗遮罩 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-overlay.show {
            display: flex;
        }
        /* 弹窗内容 */
        .modal {
            background: white;
            border-radius: 20px;
            padding: 24px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e5e7eb;
        }
        .modal-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1f2937;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #6b7280;
            padding: 4px 8px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .modal-close:hover {
            background: #f3f4f6;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }
        .form-group select,
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 0.9rem;
            background: #f9fafb;
            transition: border-color 0.2s;
        }
        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 0.9rem;
            background: #f9fafb;
            resize: vertical;
            min-height: 80px;
            transition: border-color 0.2s;
        }
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .staff-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: #f9fafb;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            font-size: 0.85rem;
        }
        .radio-option:hover {
            background: #f3f4f6;
        }
        .radio-option input[type="radio"] {
            width: auto;
            margin: 0;
            accent-color: #667eea;
        }
        .radio-option:has(input[type="radio"]:checked) {
            background: #eef2ff;
            border-color: #667eea;
        }
        .staff-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            background: #f9fafb;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        .staff-checkbox:hover {
            background: #f3f4f6;
        }
        .staff-checkbox.selected {
            background: #eef2ff;
            border-color: #667eea;
        }
        .staff-checkbox input[type="checkbox"] {
            width: auto;
            margin: 0;
            accent-color: #667eea;
        }
        .staff-name {
            font-size: 0.85rem;
            font-weight: 500;
            color: #374151;
        }
        .staff-role {
            font-size: 0.7rem;
            color: #6b7280;
        }
        .recommend-tag {
            background: #dcfce7;
            color: #166534;
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 8px;
            margin-left: auto;
        }
        .modal-footer {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #e5e7eb;
        }
        .btn-cancel {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            background: white;
            color: #374151;
            transition: all 0.2s;
        }
        .btn-cancel:hover {
            background: #f9fafb;
        }
        .btn-submit {
            flex: 2;
            padding: 10px 16px;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transition: all 0.2s;
        }
        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .notification {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 0.85rem;
        }
        .notification.success {
            background: #dcfce7;
            color: #166534;
            border-left: 4px solid #22c55e;
        }
        .notification.error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }
        .notification.warning {
            background: #fef3c7;
            color: #92400e;
            border-left: 4px solid #f59e0b;
        }
        

        /* 简单员工统计 */
        .staff-stats-simple {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            margin-top: 24px;
            overflow: hidden;
        }
        .stats-simple-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
        }
        .stats-simple-header h3 {
            margin: 0;
            font-size: 0.95rem;
            font-weight: 600;
        }
        #simpleStatsMonth {
            font-size: 0.8rem;
            opacity: 0.9;
        }
        .stats-simple-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
            padding: 14px;
        }
        .stat-simple-card {
            background: linear-gradient(135deg, #f8fafc 0%, #ffffff 100%);
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 10px 12px;
        }
        .stat-simple-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid #f1f5f9;
        }
        .stat-simple-items {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .stat-simple-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
        }
        .stat-simple-row-label {
            color: #64748b;
        }
        .stat-simple-row-value {
            font-weight: 600;
        }
        .stat-work .stat-simple-row-value { color: #10b981; }
        .stat-rest .stat-simple-row-value { color: #94a3b8; }
        .stat-leave .stat-simple-row-value { color: #ef4444; }
        .stat-cover .stat-simple-row-value { color: #8b5cf6; }

        /* 请假记录窗口 */
        .leave-records-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            margin-top: 24px;
            overflow: hidden;
        }
        .leave-records-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .leave-records-header h3 {
            margin: 0;
            font-size: 1rem;
            font-weight: 600;
        }
        .leave-count {
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
        }
        .leave-records-list {
            padding: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
        .leave-record-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #f8fafc;
            border-radius: 10px;
            margin-bottom: 8px;
            border: 1px solid #e2e8f0;
        }
        .leave-record-item:hover {
            background: #f1f5f9;
        }
        .leave-record-info {
            flex: 1;
        }
        .leave-record-date {
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 4px;
        }
        .leave-record-staff {
            font-size: 0.85rem;
            color: #64748b;
        }
        .leave-record-reason {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 4px;
        }
        .leave-record-covers {
            font-size: 0.75rem;
            color: #10b981;
            margin-top: 4px;
        }
        .leave-record-actions {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .btn-revoke {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            background: #fee2e2;
            color: #dc2626;
            transition: all 0.2s;
        }
        .btn-revoke:hover {
            background: #fecaca;
        }

        /* ==================== 移动端优化 ==================== */
        @media screen and (max-width: 768px) {
            body {
                padding: 10px;
            }
            .container {
                padding: 16px;
                border-radius: 12px;
            }
            h1 {
                font-size: 1.4rem;
            }
            .sub {
                font-size: 0.75rem;
            }
            
            /* 员工分组移动端 */
            .staff-groups {
                flex-direction: column;
                gap: 8px;
            }
            .staff-groups .group {
                padding: 6px 10px;
                flex-wrap: wrap;
            }
            .staff-groups .group h3 {
                font-size: 0.8rem;
                width: 100%;
                margin-bottom: 4px;
            }
            .staff-groups .group span {
                font-size: 0.75rem;
                padding: 2px 6px;
            }
            
            /* 工具栏移动端 */
            .toolbar {
                flex-direction: column;
                gap: 12px;
                margin-bottom: 20px;
            }
            .actions {
                width: 100%;
                justify-content: center;
            }
            .btn {
                padding: 8px 14px;
                font-size: 0.85rem;
            }
            
            /* 今日排班卡片移动端 */
            .today-schedule {
                padding: 16px;
                border-radius: 16px;
            }
            .today-header {
                flex-direction: column;
                gap: 12px;
            }
            .today-time span {
                font-size: 0.85rem;
            }
            .today-title {
                font-size: 1.1rem;
            }
            .today-btn {
                width: 100%;
                text-align: center;
            }
            .today-content {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            .today-item {
                padding: 10px 12px;
            }
            
            /* 表格移动端横向滚动 */
            .table-wrapper {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                margin: 0 -16px;
                padding: 0 16px;
            }
            table {
                font-size: 0.75rem;
                min-width: 600px;
            }
            th {
                padding: 10px 6px;
                font-size: 0.75rem;
            }
            td {
                padding: 8px 6px;
            }
            .date-col {
                width: 70px;
                font-size: 0.75rem;
            }
            .staff-tag {
                font-size: 0.65rem;
                padding: 3px 6px;
            }
            
            /* 请假记录移动端 */
            .leave-records-container {
                padding: 12px;
            }
            .leave-records-header {
                flex-direction: column;
                gap: 8px;
                align-items: flex-start;
            }
            .leave-record-item {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
            .leave-record-actions {
                width: 100%;
                flex-direction: row;
                justify-content: flex-end;
            }
            
            /* 员工统计移动端 */
            .stats-simple-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
                padding: 10px;
            }
            .stat-simple-card {
                padding: 10px;
            }
            .stat-simple-name {
                font-size: 0.85rem;
            }
            .stat-simple-row {
                font-size: 0.75rem;
            }
            
            /* 弹窗移动端 */
            .modal {
                width: 95%;
                max-width: 95%;
                margin: 20px auto;
            }
            .modal-header {
                padding: 16px;
            }
            .modal-body {
                padding: 16px;
            }
            .form-group input,
            .form-group select {
                font-size: 16px; /* 防止iOS缩放 */
            }

<script>
    // ----------------------------- 视频组配置 ---------------------------------
    const videoStaff = ["赖京华", "冯健材", "梁元科", "颜世才", "伍鹏宁"];
    const specialStaff = "资凡";
    
    function buildVideoCycle() {
        const allVideo = [...videoStaff, specialStaff];
        const rawPattern = [
            {type:"常规", assign:["S","N","N","B","R","N"]}, {type:"常规", assign:["N","S","R","N","B","N"]},
            {type:"常规", assign:["R","N","B","S","N","N"]}, {type:"常规", assign:["N","B","N","R","S","N"]},
            {type:"值班", assign:["V","R","R","V","R","V"]}, {type:"值班", assign:["R","V","V","R","R","V"]},
            {type:"常规", assign:["B","R","S","N","N","N"]}, {type:"常规", assign:["N","B","N","S","R","N"]},
            {type:"常规", assign:["S","N","R","B","N","N"]}, {type:"常规", assign:["N","R","B","N","S","N"]},
            {type:"常规", assign:["S","N","N","R","B","N"]}, {type:"值班", assign:["V","R","R","R","V","V"]},
            {type:"值班", assign:["R","R","V","V","R","V"]}, {type:"常规", assign:["N","B","S","N","R","N"]},
            {type:"常规", assign:["B","R","N","S","N","N"]}, {type:"常规", assign:["N","N","R","B","S","N"]},
            {type:"常规", assign:["S","R","N","N","B","N"]}, {type:"常规", assign:["R","N","B","S","N","N"]},
            {type:"值班", assign:["R","V","R","R","V","V"]}, {type:"值班", assign:["V","R","V","R","R","V"]},
            {type:"常规", assign:["N","B","N","R","S","N"]}, {type:"常规", assign:["B","R","S","N","N","N"]},
            {type:"常规", assign:["S","N","N","B","R","N"]}, {type:"常规", assign:["N","S","R","N","B","N"]},
            {type:"常规", assign:["R","N","B","S","N","N"]}, {type:"值班", assign:["R","R","R","V","V","V"]},
            {type:"值班", assign:["V","V","R","R","R","V"]}, {type:"常规", assign:["B","R","N","N","S","N"]}
        ];
        return rawPattern.map(pat => ({
            type: pat.type,
            assignments: Object.fromEntries(allVideo.map((s, idx) => [s, pat.assign[idx]]))
        }));
    }
    
    // ----------------------------- 平面组28天周期（每人休8天，含2次连休）---------------------------------
    function buildGraphicCycle() {
        let cycle = new Array(28);
        // 初始化全工作（拍/p交替基准）
        for(let i=0;i<28;i++) cycle[i] = { zhong: "拍", zheng: "p", overtimeNote: "" };
        
        // 1. 固定两次连休（每人4天）
        // 钟豪昌：周六+周日  (索引3周六,4周日) 和 (17周六,18周日)
        cycle[3].zhong = "休"; cycle[4].zhong = "休";
        cycle[17].zhong = "休"; cycle[18].zhong = "休";
        // 郑楚君：周日+周一  (索引11周日,12周一) 和 (24周日,25周一)
        cycle[11].zheng = "休"; cycle[12].zheng = "休";
        cycle[24].zheng = "休"; cycle[25].zheng = "休";
        
        // 2. 添加单休（每人额外4天，总休8天），且保证不同时休、不破坏连休模式
        // 钟豪昌单休日（避开已休日期，且不与郑楚君连休冲突，尽量均匀）
        const zhongSingle = [6, 9, 14, 21];  // 周二、周五、周三、周三（均非周末，不会造成连续三天休息）
        // 郑楚君单休日（避开已休日期）
        const zhengSingle = [0, 7, 15, 22];  // 周三、周三、周三、周三
        
        for(let idx of zhongSingle) if(cycle[idx].zhong !== "休") cycle[idx].zhong = "休";
        for(let idx of zhengSingle) if(cycle[idx].zheng !== "休") cycle[idx].zheng = "休";
        
        // 3. 确保两人不同时休息（若冲突，强制将郑的单休改为工作）
        for(let i=0;i<28;i++) {
            if(cycle[i].zhong === "休" && cycle[i].zheng === "休") {
                // 优先保留钟的休息，让郑工作
                cycle[i].zheng = (i%2===0) ? "拍" : "p";  // 随机但保证互补
            }
        }
        
        // 4. 填充非休息日的拍/p交替（互补且维持工作平衡）
        for(let i=0;i<28;i++) {
            const zhongRest = (cycle[i].zhong === "休");
            const zhengRest = (cycle[i].zheng === "休");
            if(zhongRest && !zhengRest) {
                // 钟休，郑不能休，状态取与前一天郑相反（避免疲劳）
                if(i>0 && cycle[i-1].zheng !== "休") cycle[i].zheng = (cycle[i-1].zheng === "拍") ? "p" : "拍";
                else cycle[i].zheng = "拍";
                continue;
            }
            if(!zhongRest && zhengRest) {
                if(i>0 && cycle[i-1].zhong !== "休") cycle[i].zhong = (cycle[i-1].zhong === "拍") ? "p" : "拍";
                else cycle[i].zhong = "拍";
                continue;
            }
            if(!zhongRest && !zhengRest) {
                if(i===0) { cycle[i].zhong = "拍"; cycle[i].zheng = "p"; }
                else {
                    let prevZhong = cycle[i-1].zhong;
                    if(prevZhong !== "休") cycle[i].zhong = (prevZhong === "拍") ? "p" : "拍";
                    else {
                        let prevZheng = cycle[i-1].zheng;
                        cycle[i].zhong = (prevZheng === "拍") ? "p" : "拍";
                    }
                    cycle[i].zheng = (cycle[i].zhong === "拍") ? "p" : "拍";
                }
            }
        }
        
        // 验证休息总天数
        let zhongRestCount = cycle.filter(d=>d.zhong==="休").length;
        let zhengRestCount = cycle.filter(d=>d.zheng==="休").length;
        console.log(`平面组休息天数: 钟豪昌=${zhongRestCount}天, 郑楚君=${zhengRestCount}天 (应为8天)`);
        
        // 特殊日期修正
        // 4月26日（索引11）：钟豪昌 应该是"拍"而不是"p"
        if (cycle[11].zhong !== "休") {
            cycle[11].zhong = "拍";
        }
        // 4月29日（索引14）：郑楚君 应该是"拍"而不是"p"
        if (cycle[14].zheng !== "休") {
            cycle[14].zheng = "拍";
        }
        
        return cycle;
    }
    
    const VIDEO_CYCLE = buildVideoCycle();
    const GRAPHIC_CYCLE = buildGraphicCycle();
    const BASE_START = new Date(2026, 3, 15);
    
    function getCycleIndex(date) {
        const diffDays = Math.floor((date - BASE_START) / (1000*60*60*24));
        let idx = diffDays % 28;
        if(idx < 0) idx += 28;
        return idx;
    }
    
    function getDailySchedule(date) {
        const idx = getCycleIndex(date);
        const videoDay = VIDEO_CYCLE[idx];
        const graphicDay = GRAPHIC_CYCLE[idx];
        const weekDay = date.getDay();
        const isWeekend = (weekDay === 0 || weekDay === 1);
        
        let videoWhite = null, videoNight = [], videoStandby = [], videoRest = [];
        for(let staff of [...videoStaff, specialStaff]) {
            const code = videoDay.assignments[staff];
            if(code === 'B') videoWhite = staff;
            else if(code === 'N' || code === 'V') videoNight.push(staff);
            else if(code === 'S') videoStandby.push(staff);
            else if(code === 'R') videoRest.push(staff);
        }
        
        let photoNight = [], photoStandby = [], photoRest = [];
        const zhong = graphicDay.zhong, zheng = graphicDay.zheng;
        // 平面组无论是拍还是p，都放在夜班·值班列
        if(zhong === "拍" || zhong === "p") photoNight.push("钟豪昌|" + zhong);
        else if(zhong === "休") photoRest.push("钟豪昌");
        
        if(zheng === "拍" || zheng === "p") photoNight.push("郑楚君|" + zheng);
        else if(zheng === "休") photoRest.push("郑楚君");
        
        let white = (videoWhite && !isWeekend) ? [videoWhite] : [];
        let night = [...videoNight, ...photoNight];
        let standby = [...videoStandby, ...photoStandby];
        let rest = [...videoRest, ...photoRest];
        
        return { white, night, standby, rest, overtimeNote: graphicDay.overtimeNote, isWeekend };
    }
    
    function renderMonth(year, month) {
        const firstDay = new Date(year, month, 1);
        const lastDay = new Date(year, month+1, 0);
        const tbody = document.getElementById("scheduleBody");
        tbody.innerHTML = "";
        
        // 获取今天日期用于定位
        const today = new Date();
        const isTodayInMonth = today.getFullYear() === year && today.getMonth() === month;
        const todayDate = today.getDate();
        
        for(let d=1; d<=lastDay.getDate(); d++) {
            // 2026年4月1日到13日不显示
            if (year === 2026 && month === 3 && d >= 1 && d <= 13) {
                continue;
            }
            
            const curDate = new Date(year, month, d);
            const weekDay = curDate.getDay();
            const weekStr = ['周日','周一','周二','周三','周四','周五','周六'][weekDay];
            
            // 判断是否是今天
            const isToday = isTodayInMonth && d === todayDate;
            
            // 日期标签添加今日标记
            let dateLabel = `${curDate.getMonth()+1}/${d} (${weekStr})`;
            if(isToday) {
                dateLabel = `${dateLabel}<span class="today-badge">今天</span>`;
            }
            
            const s = getDailySchedule(curDate);
            
            // 获取当天的请假记录
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const dayLeaves = leaveRecords.filter(l => l.date === dateStr);
            
            // 获取当天顶班的人员名单
            const coverStaffNames = dayLeaves.flatMap(l => l.coverStaff || []);
            
            // 行样式：周末背景 + 今日高亮
            let rowClass = (weekDay===0||weekDay===1) ? 'weekend-bg' : '';
            if(isToday) {
                rowClass += ' today-highlight';
            }
            
            const whiteHtml = s.white.length ? `<div class="staff-list">${s.white.map(w=>{
                const isCover = coverStaffNames.includes(w);
                const coverBadge = isCover ? ' 🔄' : '';
                return `<span class="staff-tag video">🎥 ${w}${coverBadge}</span>`;
            }).join('')}</div>` : '<span style="color:#9ca3af;">—</span>';
            let nightHtml = '';
            if(s.night.length) {
                const vNight = s.night.filter(n=>videoStaff.includes(n)||n===specialStaff).map(v=>{
                    const isCover = coverStaffNames.includes(v);
                    const coverBadge = isCover ? ' 🔄' : '';
                    return `<span class="staff-tag video">🎥 ${v}${coverBadge}</span>`;
                }).join('');
                const pNight = s.night.filter(n=>n.includes('钟豪昌')||n.includes('郑楚君')).map(p => {
                    const parts = p.split('|');
                    const name = parts[0];
                    const status = parts[1] || '拍';
                    const icon = status === 'p' ? '✏️' : '📷';
                    const suffix = status === 'p' ? '(p)' : '';
                    const isCover = coverStaffNames.includes(name);
                    const coverBadge = isCover ? ' 🔄' : '';
                    return `<span class="staff-tag photo">${icon} ${name}${suffix}${coverBadge}</span>`;
                }).join('');
                nightHtml = `<div class="staff-list">${vNight} ${pNight}</div>`;
            } else nightHtml = '<span style="color:#9ca3af;">—</span>';
            let standbyHtml = '';
            if(s.standby.length) {
                const vStand = s.standby.filter(n=>videoStaff.includes(n)||n===specialStaff).map(v=>{
                    const isCover = coverStaffNames.includes(v);
                    const coverBadge = isCover ? ' 🔄' : '';
                    return `<span class="staff-tag video">🎥 ${v}${coverBadge}</span>`;
                }).join('');
                const pStand = s.standby.filter(n=>n==="钟豪昌"||n==="郑楚君").map(p=>{
                    const isCover = coverStaffNames.includes(p);
                    const coverBadge = isCover ? ' 🔄' : '';
                    return `<span class="staff-tag photo">✏️ ${p}(p)${coverBadge}</span>`;
                }).join('');
                standbyHtml = `<div class="staff-list">${vStand} ${pStand}</div>`;
            } else standbyHtml = '<span style="color:#9ca3af;">—</span>';
            let restHtml = '';
if(s.rest.length || dayLeaves.length) {
                // 获取当天请假的人员名单
                const leaveStaffNames = dayLeaves.map(l => l.staff);
                // 获取当天顶班的人员名单
                const coverStaffNames = dayLeaves.flatMap(l => l.coverStaff || []);
                // 过滤休息人员：如果已经在请假列表或顶班列表中，就不重复显示
                const filteredRest = s.rest.filter(n => !leaveStaffNames.includes(n) && !coverStaffNames.includes(n));
                
                const vRest = filteredRest.filter(n=>videoStaff.includes(n)||n===specialStaff).map(v=>`<span class="staff-tag rest">🎥 ${v}</span>`).join('');
                const pRest = filteredRest.filter(n=>n==="钟豪昌"||n==="郑楚君").map(p=>`<span class="staff-tag rest">📷 ${p}</span>`).join('');
                const leaveHtml = dayLeaves.map(l => {

    // 生成顶班人员选项
    function generateCoverRecommendations(leaveStaff, dateStr) {
        const dateParts = dateStr.split('-');
        const date = new Date(parseInt(dateParts[0]), parseInt(dateParts[1]) - 1, parseInt(dateParts[2]));
        const schedule = getDailySchedule(date);
        const coverMode = document.querySelector('input[name="coverMode"]:checked').value;
        
        // 判断请假人员属于视频组还是平面组
        const isLeaveVideo = videoStaff.includes(leaveStaff) || leaveStaff === specialStaff;
        
        // 获取当天休息的人员作为推荐顶班候选人
        const restStaff = [...schedule.rest];
        
        // 获取待命人员作为备选
        const standbyStaff = [...schedule.standby];
        
        // 根据模式选择显示的人员
        let candidates;
        if (coverMode === 'auto') {
            // 系统自动分配模式：只显示休息和待命人员
            candidates = [...new Set([...restStaff, ...standbyStaff])]
                .filter(s => s !== leaveStaff);
        } else {
            // 自定义选择模式：显示所有人员
            candidates = allStaff.filter(s => s !== leaveStaff);
        }
        
        // 如果是视频组人员请假，只显示视频组人员作为顶班候选人
        // 如果是平面组人员请假，只显示平面组人员作为顶班候选人
        if (isLeaveVideo) {
            candidates = candidates.filter(s => videoStaff.includes(s) || s === specialStaff);
        } else {
            candidates = candidates.filter(s => !videoStaff.includes(s) && s !== specialStaff);
        }
        
        // 判断请假人员当天的班次
        let leaveShift = '';
        if (schedule.white.includes(leaveStaff)) leaveShift = '白班';
        else if (schedule.night.includes(leaveStaff)) leaveShift = '夜班';
        else if (schedule.standby.includes(leaveStaff)) leaveShift = '待命';
        
        // 显示通知
        let notification = '';
        if (schedule.rest.includes(leaveStaff)) {
            notification = showNotification('warning', '该人员当天原本就是休息状态，无需顶班');
        } else {
            const modeText = coverMode === 'auto' ? '系统推荐' : '自定义选择';
            notification = showNotification('info', `📌 ${leaveStaff} 当天排班：${leaveShift}（${modeText}模式）`);
        }
        
        // 生成顶班人员选择网格
        const grid = document.getElementById('coverStaffGrid');
        grid.innerHTML = candidates.map(candidate => {
            const isRest = restStaff.includes(candidate);
            const isStandby = standbyStaff.includes(candidate);
            const isVideo = videoStaff.includes(candidate) || candidate === specialStaff;
            const icon = isVideo ? '🎥' : '📷';
            const role = isVideo ? '视频组' : '平面组';
            
            // 系统模式下默认勾选休息人员，自定义模式下不默认勾选
            const isChecked = coverMode === 'auto' && isRest;
            
            return `
                <label class="staff-checkbox ${isChecked ? 'selected' : ''}" data-staff="${candidate}">
                    <input type="checkbox" name="coverStaff" value="${candidate}" ${isChecked ? 'checked' : ''}>
                    <div>
                        <div class="staff-name">${icon} ${candidate}</div>
                        <div class="staff-role">${role}${isStandby ? ' · 待命' : ''}</div>
                    </div>
                    ${isRest ? '<span class="recommend-tag">推荐</span>' : ''}
                </label>
            `;
        }).join('');
    }

    // 更新排班数据（请假时）
    function updateScheduleOnLeave(dateStr, leaveStaff, coverStaff) {
        const dateParts = dateStr.split('-');
        const date = new Date(parseInt(dateParts[0]), parseInt(dateParts[1]) - 1, parseInt(dateParts[2]));
        const idx = getCycleIndex(date);
        
        // 获取当天原始排班信息
        const originalSchedule = getDailySchedule(date);
        
        // 更新视频组周期数据
        const videoDay = VIDEO_CYCLE[idx];
        for (let staff of [...videoStaff, specialStaff]) {
            if (staff === leaveStaff) {
                // 将请假人员的排班改为休息
                videoDay.assignments[staff] = 'R';
            }
            // 如果是顶班人员，设置到相应班次
            if (coverStaff.includes(staff)) {
                if (originalSchedule.white.includes(leaveStaff)) {
                    videoDay.assignments[staff] = 'B';
                } else if (originalSchedule.night.includes(leaveStaff)) {
                    videoDay.assignments[staff] = 'N';
                } else if (originalSchedule.standby.includes(leaveStaff)) {
                    videoDay.assignments[staff] = 'S';
                }
            }
        }
        
        // 更新平面组周期数据
        const graphicDay = GRAPHIC_CYCLE[idx];
        if (graphicDay.zhong === leaveStaff) {
            graphicDay.zhong = '休';
        }
        if (graphicDay.zheng === leaveStaff) {
            graphicDay.zheng = '休';
        }
        
        // 设置顶班人员
        coverStaff.forEach(cover => {
            if (cover === '钟豪昌' && originalSchedule.night.includes(leaveStaff)) {
                graphicDay.zhong = '拍';
            }
            if (cover === '郑楚君' && originalSchedule.night.includes(leaveStaff)) {
                graphicDay.zheng = '拍';
            }
        });
    }

    // ----------------------------- 简单员工统计 ---------------------------------
    function updateSimpleStats() {
        document.getElementById('simpleStatsMonth').textContent = `${currentYear}年${currentMonth + 1}月`;
        
        const graphicStaff = ['钟豪昌', '郑楚君'];
        const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
        const stats = {};
        const allStaff = [...videoStaff, specialStaff, ...graphicStaff];
        
        allStaff.forEach(staff => {
            stats[staff] = { work: 0, rest: 0, leave: 0, cover: 0 };
        });
        
        // 统计每天的排班
        for (let day = 1; day <= daysInMonth; day++) {
            const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            const curDate = new Date(currentYear, currentMonth, day);
            const schedule = getDailySchedule(curDate);
            
            allStaff.forEach(staff => {
                if (schedule.white.includes(staff) || schedule.night.includes(staff) || schedule.standby.includes(staff)) {
                    stats[staff].work++;
                } else if (schedule.rest.includes(staff)) {
                    stats[staff].rest++;
                }
            });
        }
        
        // 统计请假天数和顶班天数
        leaveRecords.forEach(record => {
            const recordDate = new Date(record.date);
            if (recordDate.getFullYear() === currentYear && recordDate.getMonth() === currentMonth) {
                if (stats[record.staff]) {
                    stats[record.staff].leave++;
                    if (stats[record.staff].rest > 0) {
                        stats[record.staff].rest--;
                    }
                }
                // 统计顶班天数
                if (record.coverStaff && record.coverStaff.length > 0) {
                    record.coverStaff.forEach(cover => {
                        if (stats[cover]) {
                            stats[cover].cover++;
                            // 顶班的人工作天数已经在上面的循环中统计了
                        }
                    });
                }
            }
        });
        
        // 渲染统计卡片
        const grid = document.getElementById('simpleStatsGrid');
        grid.innerHTML = allStaff.map(staff => {
            const s = stats[staff];
            return `
                <div class="stat-simple-card">
                    <div class="stat-simple-name">${staff}</div>
                    <div class="stat-simple-items">
                        <div class="stat-simple-row stat-work">
                            <span class="stat-simple-row-label">上班</span>
                            <span class="stat-simple-row-value">${s.work}</span>
                        </div>
                        <div class="stat-simple-row stat-rest">
                            <span class="stat-simple-row-label">休息</span>
                            <span class="stat-simple-row-value">${s.rest}</span>
                        </div>
                        <div class="stat-simple-row stat-leave">
                            <span class="stat-simple-row-label">请假</span>
                            <span class="stat-simple-row-value">${s.leave}</span>
                        </div>
                        <div class="stat-simple-row stat-cover">
                            <span class="stat-simple-row-label">顶班</span>
                            <span class="stat-simple-row-value">${s.cover}</span>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // ----------------------------- 主更新函数 ---------------------------------
    function update() { 
        renderMonth(currentYear, currentMonth); 
        renderTodaySchedule();
        updateSimpleStats();
    }

    // ----------------------------- 初始化 ---------------------------------
    function init() {
        // 启动实时时间更新
        updateCurrentTime();
        setInterval(updateCurrentTime, 1000);
        
        // 渲染今日排班
        renderTodaySchedule();
        
        // 初始化月份视图
    renderMonth(currentYear, currentMonth);
    
    // 渲染请假记录列表
    renderLeaveRecords();
    
    // 更新简单统计
    updateSimpleStats();
    
    // 添加弹窗点击关闭事件
    document.getElementById('leaveModal').addEventListener('click', function(e) {
        if (e.target === this) closeLeaveModal();
    });
}

    document.getElementById("prevMonthBtn").onclick = () => {
        // 锁定在2026年4月，不允许翻阅到之前的月份
        if (currentYear === 2026 && currentMonth === 3) {
            return; // 已经是2026年4月，不能再往前翻
        }
        if(currentMonth===0) { currentMonth=11; currentYear--; } else currentMonth--;
        update();
    };
    
    document.getElementById("nextMonthBtn").onclick = () => {
        if(currentMonth===11) { currentMonth=0; currentYear++; } else currentMonth++;
        update();
    };


</script>
</body>
</html>
